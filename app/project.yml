name: LocalSmartz
options:
  bundleIdPrefix: com.localsmartz
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  SWIFT_VERSION: "5.9"
  CODE_SIGN_STYLE: Automatic
  PRODUCT_NAME: "Local Smartz"
  MARKETING_VERSION: "0.1"
  CURRENT_PROJECT_VERSION: "1"

targets:
  LocalSmartz:
    type: application
    platform: macOS
    sources:
      - LocalSmartz
    settings:
      CODE_SIGN_ENTITLEMENTS: LocalSmartz/LocalSmartz.entitlements
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
      INFOPLIST_KEY_CFBundleDisplayName: "Local Smartz"
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright \u00A9 2026"

schemes:
  LocalSmartz:
    build:
      targets:
        LocalSmartz: all
    run:
      config: Debug
    archive:
      config: Release
