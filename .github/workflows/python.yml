name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (uv sync, all groups)
        shell: bash
        run: |
          set -euo pipefail
          # pyproject.toml declares dev deps under [dependency-groups] (PEP 735),
          # which pip can't resolve. uv sync --all-groups installs base + dev.
          uv sync --all-groups

      - name: Run pytest
        shell: bash
        run: |
          set -euo pipefail
          # test_ollama.py and test_serve.py are integration tests that require a
          # running Ollama instance. CI runners don't have Ollama, so skip them here.
          uv run pytest tests/ -v --tb=short \
            --ignore=tests/test_ollama.py \
            --ignore=tests/test_serve.py \
            --junitxml=pytest-results.xml

      - name: Check routing DOE guards
        shell: bash
        run: |
          set -euo pipefail
          uv run python -m localsmartz.query_doe --repetitions 50 --score-only --min-score 2950
          uv run python -m localsmartz.agent_role_doe --repetitions 50 --score-only --min-score 2950

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.os }}
          path: pytest-results.xml
          if-no-files-found: ignore
